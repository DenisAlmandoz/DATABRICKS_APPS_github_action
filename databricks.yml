bundle:
  name: devops

include:
  - databricks/resources/*.yml

variables:
  # -------- package ------------
  package_name:
    type: string
    default: devops

  package_version:
    type: string
    default: v0.3.2

  spark_version:
    type: string
    default: 15.4.x-scala2.12

  # -------- project ------------
  cluster_policy_name:
    type: string
    default: ""   # <-- MAKE OPTIONAL

  cluster_policy_id:
    description: Databricks cluster policy ID (derived from name via lookup)
    lookup:
      cluster_policy: ${var.cluster_policy_name}
    default: ""   # <-- prevents validation failure

  pause_status:
    type: string
    default: PAUSED

  # -------- integration --------
  branch_name:
    type: string
    default: no_branch_declared

targets:

  # ============================================================
  # DEV
  # ============================================================
  dev:
    mode: development

    presets:
      name_prefix: '[${workspace.current_user.short_name}][${var.branch_name}] '
      tags:
        branch_name: ${var.branch_name}
        deployment: cicd
        package_version: ${var.package_version}

    workspace:
      host: https://dbc-b576ddfe-9e99.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/${var.branch_name}/.bundle/${bundle.name}

    run_as:
      service_principal_name: 8571ef2fb-3c7e-47d6-aa25-57f892656ada

    variables:
      cluster_policy_name: Job Multinode with GitHub Access
      pause_status: PAUSED


  # ============================================================
  # STG
  # ============================================================
  stg:
    mode: production

    presets:
      name_prefix: '[stg] '
      tags:
        deployment: cicd
        package_version: ${var.package_version}

    workspace:
      host: https://dbc-b576ddfe-9e99.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}

    permissions:
      - group_name: sand-stg-engineers
        level: CAN_RUN

    run_as:
      service_principal_name: 8571ef2fb-3c7e-47d6-aa25-57f892656ada

    variables:
      cluster_policy_name: Job Multinode with GitHub Access
      pause_status: PAUSED


  # ============================================================
  # PRD (NO POLICY)
  # ============================================================
  prd:
    mode: production

    presets:
      name_prefix: '[prd] '
      tags:
        deployment: cicd
        package_version: ${var.package_version}

    workspace:
      host: https://dbc-b576ddfe-9e99.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}

    run_as:
      service_principal_name: 8571ef2fb-3c7e-47d6-aa25-57f892656ada

    variables:
      cluster_policy_name: ""   # explicitly empty
      pause_status: PAUSED