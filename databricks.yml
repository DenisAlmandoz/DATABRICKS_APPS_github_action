bundle:
  name: devops

include:
  - databricks/resources/*.yml

variables:
  branch_name:
    default: main

targets:
  dev:
    mode: development
    workspace:
      host: https://dbc-b576ddfe-9e99.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${var.branch_name}

  stg:
    mode: production
    workspace:
      host: https://dbc-b576ddfe-9e99.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/stg

  prd:
    mode: production
    workspace:
      host: https://dbc-b576ddfe-9e99.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/prd