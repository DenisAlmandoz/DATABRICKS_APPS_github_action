name: Deploy Databricks App via Bundle

on:
  push:
    branches:
      - main
    paths:
      - databricks.yml
      - databricks/**
      - app.py
      - layout.py
      - source.py
  workflow_dispatch:
    inputs:
      environment:
        description: Databricks bundle environment/target (e.g., dev, stg, prd)
        required: true
        default: prd
        type: choice
        options:
          - dev
          - stg
          - prd

jobs:
  deploy:
    name: Deploy app resource
    runs-on: ubuntu-latest

    env:
      # Service principal authentication
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      DATABRICKS_AUTH_TYPE: oauth-m2m

      # Databricks bundle target
      DATABRICKS_BUNDLE_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'prd' }}

      # App details
      APP_NAME: hello-world-app
      WORKSPACE_REPO_PATH: /Workspace/Users/${{ env.DATABRICKS_CLIENT_ID }}/.bundle/devops

    steps:
      # Checkout repository
      - uses: actions/checkout@v4

      # Setup Databricks CLI and Bundle CLI
      - uses: databricks/setup-cli@v0.277.0

      # Validate the bundle
      - name: Validate bundle
        run: databricks bundle validate --target "$DATABRICKS_BUNDLE_ENV"

      # Deploy the bundle
      - name: Deploy bundle
        run: databricks bundle deploy --target "$DATABRICKS_BUNDLE_ENV"

      # Sync code to Databricks workspace
      - name: Sync code to Databricks
        run: databricks sync . "${{ env.WORKSPACE_REPO_PATH }}"

      # Deploy or update the app safely
      - name: Deploy or update DBS App
        run: |
          if databricks apps get "${{ env.APP_NAME }}" >/dev/null 2>&1; then
            echo "App exists, deploying source code"
            databricks apps deploy "${{ env.APP_NAME }}" --source-code-path "${{ env.WORKSPACE_REPO_PATH }}"
            databricks apps restart "${{ env.APP_NAME }}" || echo "App was not running"
          else
            echo "App does not exist, creating and deploying"
            databricks apps create --json "{\"name\":\"${{ env.APP_NAME }}\"}"
            databricks apps deploy "${{ env.APP_NAME }}" --source-code-path "${{ env.WORKSPACE_REPO_PATH }}"
          fi