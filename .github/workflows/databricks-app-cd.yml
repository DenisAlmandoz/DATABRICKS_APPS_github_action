name: Deploy Databricks App via Bundle

on:
  push:
    branches:
      - main
    paths:
      - databricks.yml
      - databricks/**
      - app.py
      - layout.py
      - source.py
  workflow_dispatch:
    inputs:
      environment:
        description: Databricks bundle environment/target (e.g., dev, stg, prd)
        required: true
        default: prd
        type: choice
        options:
          - dev
          - stg
          - prd

jobs:
  deploy:
    name: Deploy app resource
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_BUNDLE_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'prd' }}

    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@v0.277.0


      - name: Validate bundle
        run: databricks bundle validate --target "$DATABRICKS_BUNDLE_ENV"

      - name: Deploy bundle
        run: databricks bundle deploy --target "$DATABRICKS_BUNDLE_ENV"

  update_app:
    name: Start app and deploy app code
    runs-on: ubuntu-latest
    needs:
      - deploy

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_BUNDLE_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'prd' }}

    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@v1

      - name: Run bundle app resource
        run: databricks bundle run hello-world-app --target "$DATABRICKS_BUNDLE_ENV"
