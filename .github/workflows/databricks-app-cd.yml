name: Deploy Databricks App via Bundle

on:
  push:
    branches:
      - main
    paths:
      - databricks.yml
      - databricks/**
      - app.py
      - layout.py
      - source.py

  workflow_dispatch:
    inputs:
      environment:
        description: Databricks bundle environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - stg
          - prd

jobs:
  deploy:
    name: Deploy Databricks App
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      DATABRICKS_AUTH_TYPE: oauth-m2m

      DATABRICKS_BUNDLE_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}
      BRANCH_NAME: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@v0.277.0

      # Validate configuration
      - name: Validate bundle
        run: |
          databricks bundle validate \
            --target "$DATABRICKS_BUNDLE_ENV" \
            --var branch_name="${BRANCH_NAME}"

      # 🔥 Reset state if drift happened (fixes deleted app issue)
      - name: Reset bundle state (safe)
        run: |
          databricks bundle destroy \
            --target "$DATABRICKS_BUNDLE_ENV" \
            --var branch_name="${BRANCH_NAME}" \
            --auto-approve || true

      # Deploy (creates or updates apps)
      - name: Deploy bundle
        run: |
          databricks bundle deploy \
            --target "$DATABRICKS_BUNDLE_ENV" \
            --var branch_name="${BRANCH_NAME}"