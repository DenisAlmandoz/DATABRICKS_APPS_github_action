name: Deploy Databricks App via Bundle

on:
  push:
    branches:
      - main
    paths:
      - databricks.yml
      - databricks/**
      - app.py
      - layout.py
      - source.py
  workflow_dispatch:
    inputs:
      environment:
        description: Databricks bundle environment/target (e.g., dev, stg, prd)
        required: true
        default: prd
        type: choice
        options:
          - dev
          - stg
          - prd

jobs:
  deploy:
    name: Deploy app resource
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_BUNDLE_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'prd' }}
      APP_NAME: hello-world-app
      WORKSPACE_REPO_PATH: /Workspace/Users/${{ github.actor }}/.bundle/devops

    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@v0.277.0

      # Validate the bundle
      - name: Validate bundle
        run: databricks bundle validate --target "$DATABRICKS_BUNDLE_ENV"

      # Deploy the bundle
      - name: Deploy bundle
        run: databricks bundle deploy --target "$DATABRICKS_BUNDLE_ENV"

      # Sync code to Databricks workspace
      - name: Sync code to Databricks
        run: databricks sync . "${{ env.WORKSPACE_REPO_PATH }}"

      # Create app if it doesn't exist
      - name: Create DBS App if not exists
        id: create-app
        continue-on-error: true
        run: |
          databricks apps create --json "{\"name\":\"${{ env.APP_NAME }}\"}" || echo "App already exists"
          databricks apps deploy "${{ env.APP_NAME }}" --source-code-path "${{ env.WORKSPACE_REPO_PATH }}"

      # Restart app if it already exists
      - name: Restart DBS App if exists
        if: steps.create-app.outcome == 'failure'
        run: |
          databricks apps stop "${{ env.APP_NAME }}" || echo "App is not running, no need to stop"
          databricks apps start "${{ env.APP_NAME }}"